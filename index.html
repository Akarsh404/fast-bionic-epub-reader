<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bionic EPUB Reader</title>
  <!-- Google Fonts: Inter for UI, Literata for Reading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;0,7..72,700;1,7..72,400&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
  <!-- JSZip -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <!-- EPUB.js -->
  <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-sepia">

  <!-- Drop Zone (Upload View) -->
  <main id="upload-container" class="upload-container">
    <div class="glass-card upload-card" id="drop-zone">
      <div class="upload-icon-wrapper">
        <i data-lucide="book-open" class="icon-hero"></i>
      </div>
      <h2>Bionic EPUB Reader</h2>
      <p class="subtitle">Drag & drop your EPUB file here, or click to browse</p>
      
      <label for="file-input" class="btn-browse">
        <i data-lucide="upload"></i> Choose EPUB
      </label>
      <input type="file" id="file-input" accept=".epub" style="display: none;">
      
      <div id="error-message" class="error-message hidden">
        <i data-lucide="alert-circle"></i>
        <span id="error-text">Please upload a valid EPUB file.</span>
      </div>
      
      <div id="loader" class="loader hidden">
        <div class="spinner"></div>
        <p>Loading your book...</p>
      </div>
    </div>
  </main>

  <!-- Reader Application View (Hidden by default) -->
  <div id="reader-container" class="reader-container hidden">
    <!-- Top Navigation Header -->
    <header class="reader-header">
      <div class="header-left">
        <button id="btn-close" class="icon-btn" title="Close book">
          <i data-lucide="arrow-left"></i>
        </button>
        <span id="book-title" class="book-title">Bionic EPUB</span>
      </div>

      <div class="header-center">
        <span id="chapter-title" class="chapter-title">Chapter</span>
      </div>

      <div class="header-right">
        <!-- Bionic Toggle -->
        <button id="btn-toggle-bionic" class="toggle-btn active" title="Toggle Bionic Reading">
          <i data-lucide="eye"></i>
          <span>Bionic</span>
        </button>

        <!-- Font Size Config -->
        <div class="font-controls">
          <button id="btn-font-decrease" class="icon-btn-small" title="Decrease font size">
            <i data-lucide="minus"></i>
          </button>
          <span id="font-size-indicator" class="font-size-indicator">100%</span>
          <button id="btn-font-increase" class="icon-btn-small" title="Increase font size">
            <i data-lucide="plus"></i>
          </button>
        </div>

        <!-- Theme Toggle -->
        <div class="theme-dropdown-container">
          <button id="btn-theme-dropdown" class="icon-btn" title="Change theme">
            <i data-lucide="palette"></i>
          </button>
          <div id="theme-menu" class="theme-menu hidden">
            <button data-theme="sepia" class="theme-option active">
              <span class="dot sepia"></span> Sepia (Default)
            </button>
            <button data-theme="dark" class="theme-option">
              <span class="dot dark"></span> Dark Mode
            </button>
            <button data-theme="white" class="theme-option">
              <span class="dot white"></span> White Mode
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Interactive Selection Highlight Menu -->
    <div id="highlight-toolbar" class="highlight-toolbar hidden">
      <button class="hl-btn hl-yellow" data-color="yellow" title="Highlight Yellow"></button>
      <button class="hl-btn hl-green" data-color="green" title="Highlight Green"></button>
      <button class="hl-btn hl-pink" data-color="pink" title="Highlight Pink"></button>
      <button class="hl-btn hl-underline" data-color="underline" title="Underline Text">
        <i data-lucide="underline"></i>
      </button>
      <div class="toolbar-divider"></div>
      <button class="hl-btn-action btn-clear-hl" id="btn-clear-hl" title="Clear selection">
        <i data-lucide="trash-2"></i>
      </button>
    </div>

    <!-- Viewer Canvas -->
    <div class="viewer-wrapper">
      <!-- Floating Navigation (Left/Right Arrows) -->
      <button id="btn-prev" class="nav-arrow nav-arrow-left" title="Previous page">
        <i data-lucide="chevron-left"></i>
      </button>
      
      <div id="viewer" class="viewer"></div>
      
      <button id="btn-next" class="nav-arrow nav-arrow-right" title="Next page">
        <i data-lucide="chevron-right"></i>
      </button>
    </div>

    <!-- Bottom Progress/Status Bar -->
    <footer class="reader-footer">
      <div class="progress-bar-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <div class="footer-meta">
        <span id="page-indicator">Loading progress...</span>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
